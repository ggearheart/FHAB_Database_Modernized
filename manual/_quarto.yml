project:
  type: website
  output-dir: _site

website:
  title: "FHAB Tester Guide"
  description: "Onboarding guide for testers of the modernized FHAB system (pilot)."
  reader-mode: true
  page-navigation: true
  navbar:
    background: primary
    search: true
    right:
      - icon: github
        href: https://github.com/ggearheart/FHAB_Database_Modernized
        aria-label: GitHub repository
  sidebar:
    style: docked
    background: light
    contents:
      - text: "Overview"
        href: index.qmd
      - community.qmd
      - staff.qmd
      - feedback.qmd
      - glossary.qmd
  page-footer:
    center: "FHAB Database Modernized — Tester Guide (pilot). Not an official advisory or record of report."

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    anchor-sections: true
    smooth-scroll: true
